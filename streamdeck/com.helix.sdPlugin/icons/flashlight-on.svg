<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="144" height="144" rx="18" fill="#0f1012" stroke="#2a2a15" stroke-width="1.5"/>
  <rect x="16" y="137" width="112" height="4" rx="2" fill="#ffbb33" opacity="0.35"/>
  <g transform="translate(72,40)" filter="url(#glow)">
    <ellipse rx="20" ry="26" fill="#ffbb33" opacity="0.06"/>
    <polygon points="2,-26 -10,0 -1,0 -6,26 12,0 3,0" fill="#ffbb33" stroke="#ffbb33" stroke-width="0.5" stroke-linejoin="round"/>
  </g>
  <text x="72" y="100" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="19" fill="#ffbb33" letter-spacing="2">FLASH</text>
  <text x="72" y="128" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="24" fill="#ffbb33" opacity="0.9">ON</text>
</svg>
